<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>레일온도 기후리스크 지도</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --ink: #1d252d;
      --muted: #68737d;
      --line: #d6dde3;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, "Noto Sans KR", sans-serif; color: var(--ink); background: var(--bg); }
    .app { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; }
    aside { background: var(--panel); border-right: 1px solid var(--line); padding: 18px; overflow: auto; }
    main { position: relative; min-height: 100vh; }
    #map { position: absolute; inset: 0; }
    h1 { margin: 0 0 16px; font-size: 21px; line-height: 1.25; font-weight: 700; letter-spacing: 0; }
    .field { margin: 0 0 14px; }
    label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; }
    select { width: 100%; height: 36px; padding: 0 10px; border: 1px solid var(--line); border-radius: 6px; background: white; color: var(--ink); font-size: 14px; }
    .status { margin: 10px 0 0; min-height: 18px; color: var(--muted); font-size: 12px; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 16px 0; }
    .stat { border: 1px solid var(--line); border-radius: 6px; padding: 10px; background: #fbfcfd; }
    .stat b { display: block; font-size: 18px; margin-bottom: 3px; }
    .stat span { color: var(--muted); font-size: 12px; }
    .legend, .charts { margin-top: 16px; border-top: 1px solid var(--line); padding-top: 14px; }
    .legend-row { display: grid; grid-template-columns: 18px 1fr; align-items: center; gap: 8px; margin: 7px 0; font-size: 13px; }
    .swatch { width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(0,0,0,.15); }
    .chart-card { margin-top: 10px; }
    .chart-title { margin: 0 0 6px; font-size: 13px; font-weight: 700; }
    .chart-note { margin: 5px 0 0; color: var(--muted); font-size: 11px; }
    .chart-svg { display: block; width: 100%; height: 156px; border: 1px solid #edf1f4; border-radius: 6px; background: #fbfcfd; }
    .chart-axis { stroke: #ccd5dd; stroke-width: 1; }
    .chart-line { fill: none; stroke: #1c7ed6; stroke-width: 2.5; }
    .chart-line-secondary { fill: none; stroke: #9d0208; stroke-width: 2.5; }
    .chart-dot { fill: #1c7ed6; }
    .chart-bar { fill: #1c7ed6; }
    .chart-label { fill: #52616d; font-size: 10px; }
    .top-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .top-table th, .top-table td { padding: 5px 4px; border-bottom: 1px solid #edf1f4; text-align: right; }
    .top-table th:first-child, .top-table td:first-child { text-align: left; }
    .top-table th { color: var(--muted); font-weight: 700; }
    .leaflet-popup-content { margin: 12px; min-width: 210px; font-size: 13px; }
    .popup-title { font-weight: 700; margin-bottom: 8px; }
    .popup-grid { display: grid; grid-template-columns: 1fr auto; gap: 5px 12px; }
    .popup-grid span:nth-child(odd) { color: var(--muted); }
    @media (max-width: 780px) {
      .app { grid-template-columns: 1fr; grid-template-rows: auto 70vh; }
      aside { border-right: 0; border-bottom: 1px solid var(--line); }
      main { min-height: 70vh; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>레일온도 기후리스크 지도</h1>
      <div class="field"><label for="ssp">기후 시나리오</label><select id="ssp"></select></div>
      <div class="field"><label for="year">연도</label><select id="year"></select></div>
      <div class="field"><label for="month">월</label><select id="month"></select></div>
      <div class="field">
        <label for="metric">표시 지표</label>
        <select id="metric">
          <option value="p50plus">50°C 이상 발생확률</option>
          <option value="p55plus">55°C 이상 발생확률</option>
        </select>
      </div>
      <div class="status" id="status"></div>
      <div class="stats">
        <div class="stat"><b id="statPoints">0</b><span>지점 수</span></div>
        <div class="stat"><b id="statRisk">0</b><span>50°C 이상 지점</span></div>
      </div>
      <div class="legend" id="legend"></div>
      <div class="charts" id="charts">
        <label>통계 시각화</label>
        <div class="chart-card">
          <div class="chart-title">SSP 시나리오별 시기 비교</div>
          <svg class="chart-svg" id="sspCompareChart" viewBox="0 0 280 156" role="img" aria-label="SSP 시나리오별 전반기 중반기 후반기 발생확률 막대그래프"></svg>
          <p class="chart-note" id="sspCompareNote"></p>
        </div>
      </div>
    </aside>
    <main><div id="map"></div></main>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const SSPS = ["SSP126", "SSP245", "SSP370", "SSP585"];
    const sspLabels = {
      SSP126: "SSP1-2.6",
      SSP245: "SSP2-4.5",
      SSP370: "SSP3-7.0",
      SSP585: "SSP5-8.5",
    };
    const MONTHS = [
      { value: 5, label: "5월" },
      { value: 6, label: "6월" },
      { value: 7, label: "7월" },
      { value: 8, label: "8월" },
      { value: 9, label: "9월" },
    ];
    const PERIODS = [
      { id: "early", label: "전반기", range: "2021-2040", start: 2021, end: 2040 },
      { id: "mid", label: "중반기", range: "2041-2070", start: 2041, end: 2070 },
      { id: "late", label: "후반기", range: "2071-2100", start: 2071, end: 2100 },
    ];
    const colors = ["#2f9e44", "#a3b72f", "#f59f00", "#e8590c", "#9d0208"];
    const metricLabels = {
      p50plus: "50°C 이상 발생확률(%)",
      p55plus: "55°C 이상 발생확률(%)",
    };
    const controls = {
      ssp: document.getElementById("ssp"),
      year: document.getElementById("year"),
      month: document.getElementById("month"),
      metric: document.getElementById("metric"),
    };
    const statusEl = document.getElementById("status");
    const state = { points: [], cache: new Map(), rows: [] };
    const map = L.map("map", { preferCanvas: true }).setView([36.3, 127.8], 7);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors",
      maxZoom: 18,
    }).addTo(map);
    const layer = L.layerGroup().addTo(map);

    function option(select, value, text) {
      const node = document.createElement("option");
      node.value = value;
      node.textContent = text;
      select.appendChild(node);
    }
    SSPS.forEach((ssp) => option(controls.ssp, ssp, sspLabels[ssp]));
    for (let year = 2021; year <= 2100; year++) option(controls.year, year, year);
    MONTHS.forEach((month) => option(controls.month, month.value, month.label));
    controls.ssp.value = "SSP585";
    controls.year.value = "2100";
    controls.month.value = "8";
    controls.metric.value = "p50plus";

    async function loadJson(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error(url + " " + response.status);
      return response.json();
    }

    async function loadSspRows(ssp) {
      if (state.cache.has(ssp)) {
        return state.cache.get(ssp);
      }
      statusEl.textContent = sspLabels[ssp] + " 연도별 데이터를 불러오는 중입니다.";
      const payload = await loadJson("data/railtemp_annual_" + ssp + ".json");
      const rows = payload.rows.map((row) => ({
        point: row[0], year: row[1], month: row[2], mean: row[3], p50: row[4],
        p90: row[5], p95: row[6], max: row[7], p50plus: row[8], p55plus: row[9],
        risk: row[10], n: row[11],
      }));
      state.cache.set(ssp, rows);
      statusEl.textContent = "";
      return rows;
    }

    async function ensureSsp(ssp) {
      state.rows = await loadSspRows(ssp);
    }

    function colorFor(row, metric) {
      const value = row[metric];
      if (metric === "p50plus") {
        if (value >= 20) return colors[4];
        if (value >= 10) return colors[3];
        if (value >= 5) return colors[2];
        if (value > 0) return colors[1];
        return colors[0];
      }
      if (metric === "p55plus") {
        if (value >= 10) return colors[4];
        if (value >= 3) return colors[3];
        if (value >= 1) return colors[2];
        if (value > 0) return colors[1];
        return colors[0];
      }
      return colors[0];
    }

    function legendRows(metric) {
      if (metric === "p50plus") return ["0%", "0-5%", "5-10%", "10-20%", "20% 이상"];
      if (metric === "p55plus") return ["0%", "1% 미만", "1% 이상", "3% 이상", "10% 이상"];
      return ["0%", "1% 미만", "1% 이상", "5% 이상", "10% 이상"];
    }

    function renderLegend(metric) {
      const legend = document.getElementById("legend");
      legend.innerHTML = "<label>" + metricLabels[metric] + "</label>";
      legendRows(metric).forEach((label, index) => {
        const row = document.createElement("div");
        row.className = "legend-row";
        row.innerHTML = '<i class="swatch" style="background:' + colors[index] + '"></i><span>' + label + '</span>';
        legend.appendChild(row);
      });
    }

    function clearSvg(svg) {
      while (svg.firstChild) svg.removeChild(svg.firstChild);
    }

    function svgEl(name, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", name);
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
      return el;
    }

    function drawAxes(svg, width, height, pad) {
      svg.appendChild(svgEl("line", { x1: pad.left, y1: height - pad.bottom, x2: width - pad.right, y2: height - pad.bottom, class: "chart-axis" }));
      svg.appendChild(svgEl("line", { x1: pad.left, y1: pad.top, x2: pad.left, y2: height - pad.bottom, class: "chart-axis" }));
    }

    function drawText(svg, text, x, y, anchor = "middle") {
      const node = svgEl("text", { x, y, "text-anchor": anchor, class: "chart-label" });
      node.textContent = text;
      svg.appendChild(node);
    }

    function drawPeriodLabel(svg, text, x, y) {
      const match = text.match(/^(.+)\((.+)\)$/);
      if (!match) {
        drawText(svg, text, x, y);
        return;
      }
      const node = svgEl("text", { x, y, "text-anchor": "middle", class: "chart-label" });
      const first = svgEl("tspan", { x, y });
      first.textContent = match[1];
      const second = svgEl("tspan", { x, y: y + 11 });
      second.textContent = "(" + match[2] + ")";
      node.appendChild(first);
      node.appendChild(second);
      svg.appendChild(node);
    }

    function drawGroupedDecadeChart(svgId, noteId, seriesBySsp) {
      const svg = document.getElementById(svgId);
      clearSvg(svg);
      const width = 280;
      const height = 156;
      const pad = { left: 42, right: 12, top: 14, bottom: 46 };
      drawAxes(svg, width, height, pad);
      const palette = { SSP126: "#2f9e44", SSP245: "#1c7ed6", SSP370: "#f59f00", SSP585: "#9d0208" };
      const allSeries = Object.values(seriesBySsp);
      const allValues = allSeries.flat().map((d) => d.value);
      const maxValue = Math.max(1, ...allValues);
      const labels = allSeries[0].map((d) => d.label);
      const chartW = width - pad.left - pad.right;
      const chartH = height - pad.top - pad.bottom;
      const groupGap = 5;
      const groupW = (chartW - groupGap * (labels.length - 1)) / labels.length;
      const barW = groupW / SSPS.length;
      labels.forEach((label, groupIndex) => {
        SSPS.forEach((ssp, sspIndex) => {
          const value = seriesBySsp[ssp][groupIndex].value;
          const h = chartH * value / maxValue;
          const x = pad.left + groupIndex * (groupW + groupGap) + sspIndex * barW;
          const y = height - pad.bottom - h;
          svg.appendChild(svgEl("rect", { x, y, width: Math.max(1, barW - 1), height: h, rx: 1, fill: palette[ssp] }));
        });
        drawPeriodLabel(svg, label, pad.left + groupIndex * (groupW + groupGap) + groupW / 2, height - 34);
      });
      drawText(svg, maxValue.toFixed(1) + "%", 6, pad.top + 4, "start");
      document.getElementById(noteId).innerHTML =
        "기준: 5-9월 전체<br>" +
        "값: " + metricLabels[controls.metric.value] + " 평균<br>" +
        "단위: %";
    }

    async function updateCharts(rows, ssp, month, metric) {
      const seriesBySsp = {};
      for (const targetSsp of SSPS) {
        const targetRows = await loadSspRows(targetSsp);
        seriesBySsp[targetSsp] = PERIODS.map((period) => {
          const item = { value: 0, count: 0 };
          targetRows.filter((row) => row.month === 0 && row.year >= period.start && row.year <= period.end).forEach((row) => {
            item.value += row[metric];
            item.count++;
          });
          return {
            label: period.label + "(" + period.range + ")",
            value: item.value / Math.max(1, item.count),
          };
        });
      }
      state.rows = state.cache.get(ssp);
      drawGroupedDecadeChart("sspCompareChart", "sspCompareNote", seriesBySsp);
    }

    function popup(row, point) {
      return '<div class="popup-title">' + point.id + '</div>' +
        '<div class="popup-grid">' +
        '<span>시나리오</span><b>' + sspLabels[controls.ssp.value] + '</b>' +
        '<span>연도</span><b>' + row.year + '</b>' +
        '<span>월</span><b>' + MONTHS.find((m) => m.value === row.month).label + '</b>' +
        '<span>위도</span><b>' + point.lat.toFixed(5) + '</b>' +
        '<span>경도</span><b>' + point.lon.toFixed(5) + '</b>' +
        '<span>50°C 이상 발생확률</span><b>' + row.p50plus.toFixed(2) + '%</b>' +
        '<span>55°C 이상 발생확률</span><b>' + row.p55plus.toFixed(2) + '%</b>' +
        '</div>';
    }

    async function update() {
      const ssp = controls.ssp.value;
      const year = Number(controls.year.value);
      const month = Number(controls.month.value);
      const metric = controls.metric.value;
      await ensureSsp(ssp);
      const rows = state.rows.filter((row) => row.year === year && row.month === month);
      layer.clearLayers();
      const bounds = [];
      rows.forEach((row) => {
        const point = state.points[row.point];
        const marker = L.circleMarker([point.lat, point.lon], {
          radius: 6,
          color: "#263238",
          weight: 0.5,
          fillColor: colorFor(row, metric),
          fillOpacity: 0.82,
        }).bindPopup(popup(row, point));
        marker.addTo(layer);
        bounds.push([point.lat, point.lon]);
      });
      if (bounds.length) map.fitBounds(bounds, { padding: [24, 24] });

      document.getElementById("statPoints").textContent = rows.length;
      document.getElementById("statRisk").textContent = rows.filter((row) => row.p50plus > 0).length;
      renderLegend(metric);
      await updateCharts(rows, ssp, month, metric);

    }

    async function init() {
      statusEl.textContent = "지점 데이터를 불러오는 중입니다.";
      const pointsPayload = await loadJson("data/points.json");
      state.points = pointsPayload.rows.map((row) => ({ id: row[0], lat: row[1], lon: row[2] }));
      Object.values(controls).forEach((control) => control.addEventListener("change", () => {
        update().catch((error) => { statusEl.textContent = error.message; });
      }));
      await update();
    }
    init().catch((error) => { statusEl.textContent = error.message; });
  </script>
</body>
</html>
